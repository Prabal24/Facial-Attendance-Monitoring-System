<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Attendance System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 32px;
            color: #333;
        }

        .btn {
            background: #4CAF50;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #43a047;
            transform: scale(1.05);
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>Face Attendance System</h1>

        <a href="/login">
            <button class="btn">Start Attendance</button>
        </a>
    </div>

</body>
</html>
