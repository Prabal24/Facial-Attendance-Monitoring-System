<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Create Session</title>

    <style>
        body {
            background: #eef2f7;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        .wrap {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #bbb;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            display: block;
            border-radius: 6px;
        }

        .btn:hover {
            background: #43A047;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }

        a.back {
            display: block;
            margin-top: 15px;
            text-align: center;
        }
    </style>

</head>
<body>

<div class="wrap">

    <h2>Create Attendance Session</h2>

    <form method="POST">

        <label>Class</label>
        <select name="class_name" required>
            <option value="">Select Class</option>
            <option value="BCA-1">BCA-1</option>
            <option value="BCA-2">BCA-2</option>
            <option value="BCA-3">BCA-3</option>
             <option value="MCA-1">MCA-1</option>
              <option value="MCA-2">MCA-2</option>
              <option value="MCA-3">MCA-3</option>
        </select>

        <label>Subject</label>
        <input type="text" name="subject" placeholder="Enter Subject" required>

        <label>Start Time</label>
        <input type="datetime-local" name="start_time" required>

        <label>End Time</label>
        <input type="datetime-local" name="end_time" required>

        <button class="btn" type="submit">Create Session</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if msg %}
        <p class="success">{{ msg }}</p>
    {% endif %}

    <a href="javascript:history.back()" class="back">Back</a>


</div>

</body>
</html>
