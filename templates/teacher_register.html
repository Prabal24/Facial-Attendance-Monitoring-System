<!DOCTYPE html>
<html>
<head>
    <title>Teacher Register</title>

    <style>
        body {
            background: #eef2f7;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            width: 350px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #aaa;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        button:hover {
            background-color: #43A047;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Teacher Register</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Create Username" required>

            <input type="text" name="name" placeholder="Enter Full Name" required>

            <input type="password" name="password" placeholder="Create Password" required>

            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>
        </form>

        {% if error %}
            <div class="error">
                {% for e in error %}
                    <div>{{ e }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <p><a href="/login">Back to Login</a></p>
    </div>

</body>
</html>
