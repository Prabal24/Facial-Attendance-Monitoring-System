<!DOCTYPE html>
<html>
<head>
    <title>Login - Attendance System</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", Arial, sans-serif;
            background: radial-gradient(circle at top left, #eef7ff, #ffffff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            animation: fadeIn 0.7s ease-in-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #2b7a78;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: 0.2s;
        }

        select:focus, input:focus {
            border-color: #2b7a78;
            outline: none;
            box-shadow: 0 0 6px rgba(43,122,120,0.4);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #41a541;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #368a36;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #1b3c59;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if success %}
        <p class="success">Registration successful! Please login.</p>
    {% endif %}

    <form method="POST" action="/login">

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
        </select>

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit" class="btn">Login</button>
    </form>

    <a href="/teacher_register">Teacher Register</a>
</div>

</body>
</html>
